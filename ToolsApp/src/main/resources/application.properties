spring.application.name=ToolsApp

# ─── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/toolsdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rgbiuli1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=ToolTrackSecretKeyForJWTSigningMustBe256BitsLongOrMoreForSecurity!!2024
app.jwt.expiration=86400000

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${user.home}/tooltrack-uploads

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200
