<div class="login-bg">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">🔧</div>
      <h1>ToolTrack</h1>
      <p>Sign in to your workspace</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
        <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword" tabindex="-1">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <div *ngIf="error" class="error-banner">
        <mat-icon>error_outline</mat-icon>
        {{ error }}
      </div>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="full-width login-btn"
        [disabled]="loading || form.invalid"
      >
        <mat-spinner *ngIf="loading" diameter="18" style="display:inline-block;margin-right:8px;vertical-align:middle"></mat-spinner>
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

  </div>
</div>
